spring:
  application:
    name: mercadim-ai
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  servlet:
    context-path: /api

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: 120

springdoc:
  api-docs:
    path: /docs/api
  swagger-ui:
    path: /docs/swagger
