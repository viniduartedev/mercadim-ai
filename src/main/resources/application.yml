spring:
  application:
    name: mercadim-ai
  profiles:
    default: local

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  servlet:
    context-path: /api

supabase:
  url: ${SUPABASE_URL}
  jwt:
    issuer: ${SUPABASE_JWT_ISSUER}
    audience: ${SUPABASE_JWT_AUDIENCE}
    jwks-url: ${SUPABASE_JWKS_URL}

springdoc:
  api-docs:
    path: /docs/api
  swagger-ui:
    path: /docs/swagger
