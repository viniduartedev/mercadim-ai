spring:
  application:
    name: mercadim-ai
  profiles:
    default: local

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSL_MODE:require}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration

server:
  servlet:
    context-path: /api

supabase:
  url: ${SUPABASE_URL}
  jwt:
    issuer: ${SUPABASE_JWT_ISSUER}
    audience: ${SUPABASE_JWT_AUDIENCE}
    jwks-url: ${SUPABASE_JWKS_URL}

app:
  seed:
    enabled: false

springdoc:
  api-docs:
    path: /docs/api
  swagger-ui:
    path: /docs/swagger
