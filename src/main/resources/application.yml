spring:
  application:
    name: mercadim-ai

  profiles:
    active: local

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${MERCADIM_DB_HOST:aws-1-sa-east-1.pooler.supabase.com}:${MERCADIM_DB_PORT:5432}/${MERCADIM_DB_NAME:postgres}?sslmode=require
    username: ${MERCADIM_DB_USER:postgres.yhqwhczczuckynbzyrat}
    password: ${MERCADIM_DB_PASSWORD:SUA_SENHA_DO_SUPABASE}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration,classpath:db/seed

server:
  port: 8080

supabase:
  jwt:
    enabled: ${SUPABASE_JWT_ENABLED:false}
    issuer: ${SUPABASE_JWT_ISSUER:https://example.supabase.co/auth/v1}
    audience: ${SUPABASE_JWT_AUDIENCE:authenticated}
    jwks-url: ${SUPABASE_JWT_JWKS_URL:https://example.supabase.co/auth/v1/.well-known/jwks.json}
